name: Workflows,Jobs and Steps

on:
  workflow_dispatch

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "A job consist of "
      - run: echo "one or more steps"
      - run: echo "So now the upcoming jobs are dependent on these jobs"
  job-2:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Multiple jobs can run parallel"
  
  job-3:
    runs-on: ubuntu-latest
    needs:
      - job-1
      - job-2
    steps:
      - run: echo "The previous 2 jobs are dependent on each other" 
  
  job-4:
    runs-on: ubuntu-latest
    needs:
      - job-2
      - job-3
    steps:
      - run: echo "these form an directed acyclic graph(DAG) " 